<!DOCTYPE html>
<html lang="en">
<head>
    
</head>
<body>
    <div id="staticDiv">
        <h1>Test Content</h1>
        <p>This is a test paragraph to check PDF generation.</p>
    </div>
    <button id="downloadPdfButton">Download PDF</button>
    <script>
        document.getElementById('downloadPdfButton').addEventListener('click', () => {
            const targetDiv = document.getElementById('staticDiv');
            const options = {
                margin: 10,
                filename: 'test.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Generate and download PDF
            html2pdf().set(options).from(targetDiv).save();
        });
    </script>
</body>
</html>
